# cargo-deny.toml
# Bramha Dependency Audit Configuration
# Run: cargo deny check

[graph]
targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]
all-features = true

[advisories]
vulnerability = "deny"
unmaintained = "deny"
notice = "deny"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
]
deny = [
    "GPL-3.0",
    "AGPL-3.0",
    "LGPL-2.1",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-git = "warn"
unknown-registry = "deny"
